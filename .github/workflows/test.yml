name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: sforge test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install sFoundry
        run: |
          # Pin FOUNDRY_DIR so install script ignores XDG_CONFIG_HOME (set to
          # /home/runner/.config on Ubuntu runners, which would shift the path)
          export FOUNDRY_DIR="$HOME/.seismic"
          curl -L \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/SeismicSystems/seismic-foundry/contents/sfoundryup/install?ref=seismic" | bash
          "$HOME/.seismic/bin/sfoundryup"
          echo "$HOME/.seismic/bin" >> $GITHUB_PATH

      - name: Build
        run: sforge build

      - name: Test
        run: sforge test -v
